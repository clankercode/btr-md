[meta]
name = "Grok Night"
slug = "grok-night"
author = "Grok Build"
mode = "dark"
version = "1.0.0"

[palette]
# GrokNight — neutral dark surfaces with the Grok Build magenta signal.
bg = "#101011"
bg_elevated = "#1b1b1d"
fg = "#f2f2f3"
fg_muted = "#aaaab2"
accent = "#e600e6"
link = "#ff79ff"
border = "#606067"

# Editor
selection_bg = "#f2f2f3"
selection_fg = "#101011"
focus_ring = "#e600e6"
caret = "#f2f2f3"
scrollbar_thumb = "#444449"
scrollbar_track = "#101011"

# Markdown
inline_code_bg = "#1b1b1d"
inline_code_fg = "#f2f2f3"
code_block_bg = "#161618"
code_block_fg = "#f2f2f3"
code_block_border = "#444449"
blockquote_bar = "#e600e6"
blockquote_fg = "#aaaab2"
hr = "#444449"

# Tables
table_header_bg = "#1b1b1d"
table_row_alt = "#151517"
table_border = "#444449"

# Admonitions
admonition_note = "#e600e6"
admonition_warn = "#ffbd5b"
admonition_tip = "#6fdb98"

# Kbd
kbd_bg = "#1b1b1d"
kbd_fg = "#f2f2f3"
kbd_border = "#606067"

# Links
link_hover = "#ffb0ff"
link_visited = "#e690e6"
image_caption = "#aaaab2"

# Mermaid

# Syntax — magenta control flow on neutral surfaces, with distinct content tokens.
syntax = { keyword = "#ff79ff", string = "#9ee6b7", number = "#ffbd5b", function = "#ff9cff", type = "#77d8ff", comment = "#82828a", operator = "#d4d4d8", punctuation = "#d4d4d8", variable = "#ffce82", constant = "#ffbd5b" }
