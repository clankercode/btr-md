[meta]
name = "Grok Day"
slug = "grok-day"
author = "Grok Build"
mode = "light"
version = "1.0.0"

[palette]
# GrokDay — neutral light surfaces with the Grok Build magenta signal.
bg = "#fafafa"
bg_elevated = "#ffffff"
fg = "#1d1d1f"
fg_muted = "#62626a"
accent = "#b000b5"
link = "#9d009f"
border = "#767680"

# Editor
selection_bg = "#1d1d1f"
selection_fg = "#ffffff"
focus_ring = "#b000b5"
caret = "#1d1d1f"
scrollbar_thumb = "#c7c7cc"
scrollbar_track = "#eeeeef"

# Markdown
inline_code_bg = "#eeeeef"
inline_code_fg = "#1d1d1f"
code_block_bg = "#f1f1f2"
code_block_fg = "#1d1d1f"
code_block_border = "#c7c7cc"
blockquote_bar = "#b000b5"
blockquote_fg = "#62626a"
hr = "#c7c7cc"

# Tables
table_header_bg = "#eeeeef"
table_row_alt = "#f5f5f6"
table_border = "#c7c7cc"

# Admonitions
admonition_note = "#b000b5"
admonition_warn = "#8a5b00"
admonition_tip = "#147a42"

# Kbd
kbd_bg = "#eeeeef"
kbd_fg = "#1d1d1f"
kbd_border = "#767680"

# Links
link_hover = "#78007b"
link_visited = "#7a397b"
image_caption = "#62626a"

# Mermaid

# Syntax — the magenta accent stays for control flow; content tokens remain legible.
syntax = { keyword = "#a000a3", string = "#08733c", number = "#9a4f00", function = "#8a008c", type = "#006b8f", comment = "#6b6b73", operator = "#1d1d1f", punctuation = "#1d1d1f", variable = "#a33a00", constant = "#9a4f00" }
