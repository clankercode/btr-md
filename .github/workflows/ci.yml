name: ci
on: [push, pull_request]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  # Fast-fail: rustfmt only — no webkit/apt. Catches formatting before expensive jobs.
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
  check:
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: cargo clippy --workspace --all-targets -j 2 -- -D warnings
      - run: cargo test --workspace -j 2 --exclude pmd-e2e
  e2e:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Install just
        uses: extractions/setup-just@v2
      - name: Run e2e (bridge networking)
        run: just e2e
        env:
          PMD_E2E_NETWORK: bridge
