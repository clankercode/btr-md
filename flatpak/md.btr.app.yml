# Development Flatpak manifest. Cargo runs inside the Freedesktop SDK with
# rust-stable on PATH; this dev manifest allows network during build so cargo
# can fetch crates. A release manifest should vendor cargo sources instead.
app-id: md.btr.app
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: btr-md
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=xdg-documents
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  build-args:
    - --share=network
cleanup:
  - /include
  - /lib/pkgconfig
modules:
  - name: btr-md
    buildsystem: simple
    build-commands:
      - cargo build --release --locked -j 2 -p pmd-app
      - install -Dm755 target/release/btr-md /app/bin/btr-md
      - install -Dm644 packaging/linux/md.btr.app.desktop /app/share/applications/md.btr.app.desktop
      - install -Dm644 packaging/linux/md.btr.app.metainfo.xml /app/share/metainfo/md.btr.app.metainfo.xml
      - install -Dm644 packaging/linux/md.btr.app.mime.xml /app/share/mime/packages/md.btr.app.mime.xml
      - install -Dm644 packaging/linux/btr-md.1 /app/share/man/man1/btr-md.1
      - install -Dm644 packaging/linux/icons/btr-md.svg /app/share/icons/hicolor/scalable/apps/md.btr.app.svg
      - for size in 16 24 32 48 64 128 256; do install -Dm644 packaging/linux/icons/${size}x${size}.png /app/share/icons/hicolor/${size}x${size}/apps/md.btr.app.png; done
      - mkdir -p /app/share/btr-md/themes
      - cp -a themes/. /app/share/btr-md/themes/
    sources:
      - type: dir
        path: ..
